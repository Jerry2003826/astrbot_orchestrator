name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: |
          ruff format --check .
          ruff check __init__.py main.py artifacts entrypoints runtime shared tests workflow/engine.py orchestrator/code_extractor.py orchestrator/meta_orchestrator.py orchestrator/agent_coordinator.py orchestrator/core.py autonomous/skill_creator.py autonomous/mcp_configurator.py autonomous/executor.py sandbox/base.py sandbox/factory.py sandbox/local_sandbox.py sandbox/shipyard_sandbox.py

      - name: Mypy
        run: mypy --follow-imports=skip shared/conditions.py shared/path_safety.py runtime/request_context.py runtime/pipeline.py runtime/container.py runtime/graph_state.py entrypoints/command_handlers.py artifacts/service.py

      - name: Bandit
        run: bandit -q -r artifacts entrypoints runtime shared sandbox workflow

      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest tests/unit
