name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: |
          ruff format --check .
          ruff check .

      - name: Mypy
        run: >-
          mypy --follow-imports=skip
          shared/conditions.py shared/path_safety.py
          runtime/request_context.py runtime/container.py
          entrypoints/command_handlers.py artifacts/service.py
          orchestrator/agent_runner.py orchestrator/dynamic_agent_manager.py
          tools

      - name: Bandit
        run: bandit -q -r artifacts entrypoints runtime shared sandbox tools workflow

      - name: Pytest
        run: |
          mkdir -p /tmp/pkg
          ln -s $PWD /tmp/pkg/astrbot_orchestrator_v5
          PYTHONPATH=/tmp/pkg pytest tests/unit
